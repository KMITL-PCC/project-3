services:
  backend:
    build: .
    # ตั้งชื่อ Container
    container_name: app-backend
    # ทำการ Restart ทุกครั้งใหม่ให้อัตโนมัติเมื่อ App Crash
    restart: always
    # กำหนด port ที่ใช้งาน
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=production
      # รอทีม DataBase
      # เตรียมดึงจากไฟล์ .env
      # - DB_HOST=
      # - DB_USER=
      # - DB_PASS=
    # depends_on:
    #   - database
  
  redis:
    image: redis:7
    container_name: app-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # รอทีม database
  # database:
